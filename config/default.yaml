# AML Transaction Monitoring - Default Configuration
# Override via config/dev.yaml or environment variables (AML_*)

app:
  name: aml-monitoring
  env: default
  log_level: INFO

database:
  url: sqlite:///./data/aml.db
  echo: false

ingest:
  csv_encoding: utf-8
  jsonl_chunk_size: 1000
  batch_size: 500

rules:
  high_value:
    enabled: true
    threshold_amount: 10000
    currency_default: USD
    severity: high
    score_delta: 25.0
  rapid_velocity:
    enabled: true
    min_transactions: 5
    window_minutes: 15
    severity: medium
    score_delta: 20.0
  geo_mismatch:
    enabled: true
    window_minutes: 60
    max_countries_in_window: 2
    severity: medium
    score_delta: 15.0
  structuring_smurfing:
    enabled: true
    threshold_amount: 9500
    min_transactions: 3
    window_minutes: 60
    severity: high
    score_delta: 30.0
  sanctions_keyword:
    enabled: true
    list_version: "1.0"
    effective_date: "2026-01-01"
    severity: high
    score_delta: 30.0
    keywords:
      - sanctioned
      - ofac
      - blocked
      - restricted
  high_risk_country:
    enabled: true
    list_version: "1.0"
    effective_date: "2026-01-01"
    severity: high
    score_delta: 25.0
    countries:
      - XX  # placeholder; replace with ISO codes (validation fails until overridden)
      - YY
  network_ring:
    enabled: true
    min_shared_counterparties: 2
    min_linked_accounts: 2
    lookback_days: 30
    severity: high
    score_delta: 40

scoring:
  base_risk_per_customer: 10
  max_score: 100
  thresholds:
    low: 33
    medium: 66
    high: 100
  severity_multipliers:
    critical: 2.0
    high: 1.5
    medium: 1.0
    low: 0.5
  temporal_decay:
    enabled: false  # enable for v2 scoring
    windows:
      - within_hours: 24
        factor: 1.0
      - within_hours: 168   # 7 days
        factor: 0.7
      - within_hours: 720   # 30 days
        factor: 0.4
    floor: 0.2
  profiles:
    conservative:
      severity_multipliers:
        critical: 2.5
        high: 2.0
        medium: 1.5
        low: 1.0
      thresholds:
        low: 25
        medium: 50
        high: 100
      base_risk_per_customer: 15
    balanced:
      severity_multipliers:
        critical: 2.0
        high: 1.5
        medium: 1.0
        low: 0.5
      thresholds:
        low: 33
        medium: 66
        high: 100
      base_risk_per_customer: 10
    aggressive:
      severity_multipliers:
        critical: 1.5
        high: 1.0
        medium: 0.7
        low: 0.3
      thresholds:
        low: 45
        medium: 75
        high: 100
      base_risk_per_customer: 5

reporting:
  output_dir: ./reports
  sar_format: true
  include_evidence: true

api:
  host: 127.0.0.1
  port: 8000
  workers: 1

security:
  rate_limiting:
    enabled: true
    read_limit: "100/minute"
    write_limit: "20/minute"
  cors:
    enabled: true
    allowed_origins:
      - "http://localhost"
      - "http://localhost:8000"
      - "http://localhost:8501"
      - "http://127.0.0.1"
      - "http://127.0.0.1:8000"
      - "http://127.0.0.1:8501"
    allow_methods:
      - "GET"
      - "POST"
      - "PATCH"
      - "OPTIONS"
    allow_headers:
      - "X-API-Key"
      - "X-Correlation-ID"
      - "Content-Type"
    allow_credentials: false
  headers:
    x_content_type_options: "nosniff"
    x_frame_options: "DENY"
    x_xss_protection: "1; mode=block"
    content_security_policy: "default-src 'none'; frame-ancestors 'none'"
    referrer_policy: "strict-origin-when-cross-origin"
    cache_control: "no-store"
  request:
    max_body_size_bytes: 1048576  # 1 MB

run_rules:
  chunk_size: 0  # 0 = no chunking (load all); set e.g. 5000 for bounded memory + checkpoint

stream_simulate:
  delay_seconds: 1
  batch_size: 10
